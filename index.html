<script>
const payload = JSON.parse(document.getElementById('encrypted-trip').textContent);
const statusEl = document.getElementById('status');
const form = document.getElementById('unlockForm');
const button = document.getElementById('unlockButton');
function fromBase64(value){
  const bin = atob(value);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
async function deriveKey(password){
  const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:fromBase64(payload.salt), iterations:payload.iterations, hash:'SHA-256' },
    material,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
}
async function decrypt(password){
  const bytes = fromBase64(payload.data);
  const key = await deriveKey(password);
  return crypto.subtle.decrypt({ name:'AES-GCM', iv:fromBase64(payload.iv), tagLength:128 }, key, bytes);
}
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const password = document.getElementById('password').value;
  if(!password){ statusEl.textContent = '請輸入密碼。'; return; }
  button.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = '解鎖中...';
  try {
    const html = new TextDecoder().decode(await decrypt(password));
    statusEl.className = 'status ok';
    statusEl.textContent = '解鎖成功，載入行程...';
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    statusEl.className = 'status';
    statusEl.textContent = '密碼不正確，或檔案已損壞。';
    button.disabled = false;
  }
});
</script>
